<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700;900&family=DM+Sans:wght=300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brown:#3D2B1F;--brown-light:#5a3e2e;--brown-dim:#2a1d14;
  --green:#2E5E2E;--green-light:#3d7a3d;
  --tan:#F5EFE6;--tan-dark:#e8ddd0;
  --amber:#C47B2B;--amber-light:#d4913e;
  --ink:#1a1410;--muted:#7a6a5a;--border:#d9cfc3;
  --white:#ffffff;
}
body{font-family:'DM Sans',sans-serif;background:var(--tan);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* NAV */
.nav{background:var(--brown);padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;min-height:64px}
.nav-left{display:flex;align-items:center;gap:14px}
.bigfoot-icon{width:42px;height:42px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo{font-family:'Playfair Display',serif;font-size:19px;color:var(--white);letter-spacing:-.2px;line-height:1.15}
.logo-sub">Pre-Approval Letter Portal</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-pill">Eric Nearing · NMLS #1884</div>
  </div>
</div>

<div id="navigation-tabs" class="tabs admin-mode">
  <div class="tab active" id="tab-lo-setup" onclick="switchTab('lo-setup')">🔧 LO Setup</div>
  <div class="tab" id="tab-lo-dashboard" onclick="switchTab('lo-dashboard')">📋 My Letters</div>
  <div class="tab" id="tab-borrower" onclick="switchTab('borrower')">🏠 Borrower View</div>
  <div class="tab" id="tab-preview" onclick="switchTab('preview')">📄 Letter Preview</div>
</div>

<!-- LO SETUP -->
<div id="lo-setup" class="panel active">
  <p class="section-title">Create a borrower link</p>
  <p class="section-sub">Set the caps once. Share the link. Never get that email again.</p>
  <div class="setup-grid">
    <div class="field full">
      <label>Borrower name(s)</label>
      <input id="lo-borrower" type="text" placeholder="e.g. Sarah & James Morrow" value="Sarah & James Morrow">
    </div>
    <div class="field">
      <label>Max approved amount</label>
      <input id="lo-max" type="number" placeholder="425000" value="425000">
      <div class="hint">Borrower cannot exceed this</div>
    </div>
    <div class="field">
      <label>Loan type</label>
      <select id="lo-loantype">
        <option>Conventional</option>
        <option>FHA</option>
        <option>VA</option>
        <option>USDA</option>
        <option>Jumbo</option>
      </select>
    </div>
    <div class="field">
      <label>Min Seller Concessions (%)</label>
      <input id="lo-min-concessions-pct" type="number" step="0.1" placeholder="0.0" value="0.0">
      <div class="hint">Minimum percentage floor</div>
    </div>
    <div class="field">
      <label>Max Seller Concessions (%)</label>
      <input id="lo-max-concessions-pct" type="number" step="0.1" placeholder="3.0" value="3.0">
      <div class="hint">Maximum percentage ceiling</div>
    </div>
    <div class="field">
      <label>Link expires</label>
      <input id="lo-expiry" type="date" value="2026-08-31">
    </div>
    <div class="field full" style="margin-top:6px">
      <button class="btn-primary" onclick="generateLink()" style="width:fit-content">Generate borrower link →</button>
    </div>
  </div>
  <div class="link-box" id="link-box" style="display:none">
    <div>
      <div style="font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px">Send this to your borrower or their realtor</div>
      <div class="link-url" id="link-url"></div>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="lo-dashboard" class="panel">
  <p class="section-title">Active letter links</p>
  <p class="section-sub">Every link you've created — who's used it and when it expires.</p>
  <table class="lo-table">
    <thead>
      <tr>
        <th>Borrower</th>
        <th>Max Amount</th>
        <th>Loan Type</th>
        <th>Concessions Cap</th>
        <th>Expires</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>Sarah &amp; James Morrow</strong></td>
        <td>$425,000</td>
        <td>Conventional</td>
        <td>0.0% - 3.0%</td>
        <td>Aug 31, 2026</td>
        <td><span class="pill-active">Active</span></td>
      </tr>
    </tbody>
  </table>
</div>

<!-- BORROWER VIEW -->
<div id="borrower" class="panel">
  <div class="borrower-wrap">
    <p class="section-title">Generate your letter</p>
    <p class="section-sub">Enter your offer details — your lender has set the approved limits.</p>
    <div class="letter-card">
      <div class="letter-header">
        <div class="lh-left">
          <div class="lh-icon">🦶</div>
          <div>
            <div class="lender-name">Bigfoot Mortgage</div>
            <div class="lender-sub">Eric Nearing · NMLS #1884 · Tennessee</div>
          </div>
        </div>
        <div class="nmls-badge">PRE-APPROVAL<br>LETTER PORTAL</div>
      </div>
      <div class="letter-body">
        <div class="borrow-field">
          <div class="borrow-label">Borrower(s)</div>
          <div class="locked-val">🔒 <span id="b-borrower">Sarah &amp; James Morrow</span></div>
        </div>
        <div class="two-col">
          <div class="borrow-field">
            <div class="borrow-label">Loan type</div>
            <div class="locked-val">🔒 <span id="b-loantype">Conventional</span></div>
          </div>
          <div class="borrow-field">
            <div class="borrow-label">Property address <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">(optional)</span></div>
            <input class="editable-val" id="b-address" type="text" placeholder="123 Oak St, Nashville TN" style="font-size:13px;font-weight:400;border-color:var(--border)">
          </div>
        </div>
        <div class="borrow-field">
          <div class="borrow-label">Offer amount</div>
          <input class="editable-val" id="b-amount" type="number" placeholder="Enter offer amount" value="398000" oninput="handleOfferAmountChange()">
          <div class="cap-ok" id="b-amount-cap">✓ Within approved limit of $<span id="b-maxshow">425,000</span></div>
          <div class="alert" id="b-amount-alert">⚠ This exceeds your approved maximum. Please enter a lower amount.</div>
        </div>
        
        <!-- Interactive Concessions System Area -->
        <div class="borrow-field">
          <div class="borrow-label">Seller Concessions Setup</div>
          
          <!-- Minimum Blocks -->
          <div class="toggle-row" style="flex-direction: column; align-items: stretch; gap: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 12px; font-weight:600; text-transform: uppercase; color: var(--brown);">Minimum Limits</span>
              <label class="toggle-control">
                <input type="checkbox" id="show-min-checkbox" checked onchange="syncPreview()"> Show on Letter
              </label>
            </div>
            <div class="two-col">
              <div>
                <label style="font-size: 9px; color: var(--muted)">Dollar Amount ($)</label>
                <input class="editable-val" style="padding: 6px 10px; font-size: 13px;" type="number" id="b-min-val-dollar" oninput="convertConcession('min', 'dollar')">
              </div>
              <div>
                <label style="font-size: 9px; color: var(--muted)">Percentage (%)</label>
                <input class="editable-val" style="padding: 6px 10px; font-size: 13px;" type="number" step="0.1" id="b-min-val-pct" oninput="convertConcession('min', 'pct')">
              </div>
            </div>
            <div class="hint" id="b-min-hint-bounds">Allowed floor range: 0% up to <span id="b-setup-min-floor">0</span>%</div>
          </div>

          <!-- Maximum Blocks -->
          <div class="toggle-row" style="flex-direction: column; align-items: stretch; gap: 8px; margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 12px; font-weight:600; text-transform: uppercase; color: var(--brown);">Maximum Limits</span>
              <label class="toggle-control">
                <input type="checkbox" id="show-max-checkbox" checked onchange="syncPreview()"> Show on Letter
              </label>
            </div>
            <div class="two-col">
              <div>
                <label style="font-size: 9px; color: var(--muted)">Dollar Amount ($)</label>
                <input class="editable-val" style="padding: 6px 10px; font-size: 13px;" type="number" id="b-max-val-dollar" oninput="convertConcession('max', 'dollar')">
              </div>
              <div>
                <label style="font-size: 9px; color: var(--muted)">Percentage (%)</label>
                <input class="editable-val" style="padding: 6px 10px; font-size: 13px;" type="number" step="0.1" id="b-max-val-pct" oninput="convertConcession('max', 'pct')">
              </div>
            </div>
            <div class="hint" id="b-max-hint-bounds">Allowed ceiling cap: Max <span id="b-setup-max-cap">3.0</span>%</div>
          </div>
          
          <div class="alert" id="b-concession-alert">⚠ Inputted values are outside the limits set by your lender. Setting to max allowed parameter bounds.</div>
        </div>
      </div>
      <div class="letter-footer">
        <div class="expiry">Link expires: <strong id="b-exp-date">Aug 31, 2026</strong></div>
        <button class="btn-amber" onclick="generateLetter()">Generate letter →</button>
      </div>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div id="preview" class="panel">
  <div class="preview-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <p class="section-title">Your letter is ready</p>
        <p class="section-sub">Review below, then download.</p>
      </div>
      <div style="display:flex; gap:8px;">
         <button class="copy-btn" id="back-to-edit-btn" onclick="switchTab('borrower')" style="background:var(--brown); color:white; border-color:var(--brown);">← Adjust Form</button>
         <button class="btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
      </div>
    </div>
    <div class="pdf-preview">
      <div class="pdf-top-bar"></div>
      <div class="pdf-header">
        <div class="pdf-logo-row">
          <div class="pdf-icon">🦶</div>
          <div>
            <div class="pdf-lender">Bigfoot Mortgage</div>
            <div class="pdf-lender-sub">Where great loans leave a big impression.</div>
          </div>
        </div>
        <div class="pdf-nmls">
          Eric Nearing, MLO<br>
          NMLS #1884<br>
          <span id="p-date"></span>
        </div>
      </div>
      <div class="pdf-body">
        <p>To Whom It May Concern,</p>
        <p>This letter is to confirm that <strong id="p-borrower">Sarah &amp; James Morrow</strong> has been pre-approved for a mortgage loan under the following terms:</p>
        <div style="background:#faf7f3; padding:16px; border-radius:8px; border:1px solid var(--border); margin-bottom:14px;">
          <strong>Loan Type:</strong> <span id="p-loantype">Conventional</span><br>
          <span style="display:block; margin-top:6px;"><strong>Pre-Approved Purchase Price (not to exceed):</strong></span>
          <span class="amount-highlight" id="p-amount">$398,000</span>
          
          <div id="p-min-con-line" style="margin-top:4px;"><strong>Minimum Seller Concessions:</strong> <span id="p-p-mincon">$0</span></div>
          <div id="p-max-con-line" style="margin-top:4px;"><strong>Maximum Seller Concessions:</strong> <span id="p-p-maxcon">$0</span></div>
        </div>
        <p id="p-address-line"></p>
        <p>This pre-approval is based on information provided at the time of application and is subject to satisfactory appraisal, title review, and final underwriting approval. This letter does not constitute a commitment to lend.</p>
        <p>Please do not hesitate to contact our office with any questions.</p>
        <div class="pdf-sig">
          <div class="sig-line"></div>
          <div class="sig-name">Eric Nearing</div>
          <div class="sig-title">Mortgage Loan Officer · NMLS #1884</div>
          <div class="sig-title">Bigfoot Mortgage · Tennessee</div>
          <div class="sig-title" style="margin-top:6px;font-size:10px;color:#bbb">letters.bigfootmortgage.com</div>
        </div>
      </div>
      <div class="pdf-footer-bar"></div>
    </div>
  </div>
</div>

<script>
let config = {
  borrower: "Sarah & James Morrow",
  maxAmount: 425000,
  loanType: "Conventional",
  minConPct: 0.0,
  maxConPct: 3.0,
  expiry: "2026-08-31"
};

window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  
  if (urlParams.has('b')) {
    config.borrower = urlParams.get('b');
    config.maxAmount = Number(urlParams.get('m')) || 425000;
    config.loanType = urlParams.get('l') || 'Conventional';
    config.minConPct = parseFloat(urlParams.get('mnC')) || 0.0;
    config.maxConPct = parseFloat(urlParams.get('mxC')) || 3.0;
    config.expiry = urlParams.get('e') || '2026-08-31';
    
    document.getElementById('navigation-tabs').classList.remove('admin-mode');
    switchTab('borrower');
  } else {
    document.getElementById('p-date').textContent = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  }
});

function switchTab(name){
  const ids=['lo-setup','lo-dashboard','borrower','preview'];
  const tabsContainer = document.getElementById('navigation-tabs');
  if(tabsContainer.classList.contains('admin-mode')) {
     document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',ids[i]===name));
  }
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===name));
  if(name==='borrower') syncBorrower();
  if(name==='preview') syncPreview();
}

function generateLink(){
  const borrower = document.getElementById('lo-borrower').value || 'Borrower';
  const max = document.getElementById('lo-max').value || 425000;
  const type = document.getElementById('lo-loantype').value;
  const minC = document.getElementById('lo-min-concessions-pct').value || 0;
  const maxC = document.getElementById('lo-max-concessions-pct').value || 0;
  const exp = document.getElementById('lo-expiry').value || '2026-08-31';

  // Clean name string & clear out dates punctuation symbols 
  const cleanStringName = borrower.replace(/[^a-zA-Z0-9]/g, '');
  const basePoint = window.location.origin + window.location.pathname;
  
  // Output clean parametric shareable URL variables
  const secureUrl = `${basePoint}?b=${encodeURIComponent(cleanStringName)}&m=${max}&l=${encodeURIComponent(type)}&mnC=${minC}&mxC=${maxC}&e=${exp}`;

  document.getElementById('link-url').textContent = secureUrl;
  document.getElementById('link-box').style.display = 'flex';
}

function copyLink(){
  navigator.clipboard.writeText(document.getElementById('link-url').textContent).catch(()=>{});
  const b=document.getElementById('copy-btn');
  b.textContent='Copied!';b.classList.add('copied');
  setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied')},2000);
}

function syncBorrower(){
  document.getElementById('b-borrower').textContent = config.borrower;
  document.getElementById('b-loantype').textContent = config.loanType;
  document.getElementById('b-maxshow').textContent = Number(config.maxAmount).toLocaleString();
  document.getElementById('b-exp-date').textContent = config.expiry;
  
  document.getElementById('b-setup-min-floor').textContent = config.minConPct;
  document.getElementById('b-setup-max-cap').textContent = config.maxConPct;

  // Set standard starting baseline parameters
  const offerAmt = Number(document.getElementById('b-amount').value) || 0;
  
  document.getElementById('b-min-val-pct').value = config.minConPct;
  document.getElementById('b-min-val-dollar').value = Math.round(offerAmt * (config.minConPct / 100));
  
  document.getElementById('b-max-val-pct').value = config.maxConPct;
  document.getElementById('b-max-val-dollar').value = Math.round(offerAmt * (config.maxConPct / 100));
  
  validateOfferLimits();
}

function handleOfferAmountChange() {
  validateOfferLimits();
  // Readjust dollar fields relative to the new adjusted price basis anchor
  const amt = Number(document.getElementById('b-amount').value) || 0;
  const minPct = Number(document.getElementById('b-min-val-pct').value) || 0;
  const maxPct = Number(document.getElementById('b-max-val-pct').value) || 0;
  
  document.getElementById('b-min-val-dollar').value = Math.round(amt * (minPct / 100));
  document.getElementById('b-max-val-dollar').value = Math.round(amt * (maxPct / 100));
}

function validateOfferLimits() {
  const val = Number(document.getElementById('b-amount').value) || 0;
  const max = Number(config.maxAmount);
  document.getElementById('b-amount-cap').style.display = (val > 0 && val <= max) ? 'block' : 'none';
  document.getElementById('b-amount-alert').classList.toggle('show', val > max);
}

function convertConcession(type, sourceField) {
  const amt = Number(document.getElementById('b-amount').value) || 0;
  const alertBanner = document.getElementById('b-concession-alert');
  alertBanner.classList.remove('show');

  if(amt <= 0) return;

  if(type === 'min') {
    let pctVal = 0;
    if(sourceField === 'dollar') {
      const dollarVal = Number(document.getElementById('b-min-val-dollar').value) || 0;
      pctVal = (dollarVal / amt) * 100;
    } else {
      pctVal = Number(document.getElementById('b-min-val-pct').value) || 0;
    }

    // Restrict within specific structural parameters
    if (pctVal < 0 || pctVal > config.maxConPct) {
      alertBanner.classList.add('show');
      pctVal = (pctVal < 0) ? 0 : config.maxConPct;
    }

    if(sourceField === 'dollar') {
      document.getElementById('b-min-val-pct').value = parseFloat(pctVal.toFixed(2));
    } else {
      document.getElementById('b-min-val-dollar').value = Math.round(amt * (pctVal / 100));
    }

  } else if (type === 'max') {
    let pctVal = 0;
    if(sourceField === 'dollar') {
      const dollarVal = Number(document.getElementById('b-max-val-dollar').value) || 0;
      pctVal = (dollarVal / amt) * 100;
    } else {
      pctVal = Number(document.getElementById('b-max-val-pct').value) || 0;
    }

    // Boundary caps checks execution
    if (pctVal < config.minConPct || pctVal > config.maxConPct) {
      alertBanner.classList.add('show');
      pctVal = (pctVal > config.maxConPct) ? config.maxConPct : config.minConPct;
    }

    if(sourceField === 'dollar') {
      document.getElementById('b-max-val-pct').value = parseFloat(pctVal.toFixed(2));
    } else {
      document.getElementById('b-max-val-dollar').value = Math.round(amt * (pctVal / 100));
    }
  }
  syncPreview();
}

function generateLetter(){
  const amt = Number(document.getElementById('b-amount').value);
  const maxA = Number(config.maxAmount);
  if(amt <= 0 || amt > maxA){
     alert('Please input a valid offer amount underneath your approved bounds.');
     return;
  }
  syncPreview();
  switchTab('preview');
}

function syncPreview(){
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('p-date').textContent = today;
  document.getElementById('p-borrower').textContent = config.borrower;
  document.getElementById('p-loantype').textContent = config.loanType;
  
  const amt = Number(document.getElementById('b-amount').value) || 0;
  document.getElementById('p-amount').textContent = '$' + amt.toLocaleString();
  
  const minDollar = Number(document.getElementById('b-min-val-dollar').value) || 0;
  const minPct = Number(document.getElementById('b-min-val-pct').value) || 0;
  const maxDollar = Number(document.getElementById('b-max-val-dollar').value) || 0;
  const maxPct = Number(document.getElementById('b-max-val-pct').value) || 0;
  
  const showMin = document.getElementById('show-min-checkbox').checked;
  const showMax = document.getElementById('show-max-checkbox').checked;
  
  const minLine = document.getElementById('p-min-con-line');
  const maxLine = document.getElementById('p-max-con-line');
  
  if(showMin) {
    minLine.style.display = 'block';
    document.getElementById('p-p-mincon').textContent = '$' + minDollar.toLocaleString() + ' (' + minPct + '%)';
  } else {
    minLine.style.display = 'none';
  }
  
  if(showMax) {
    maxLine.style.display = 'block';
    document.getElementById('p-p-maxcon').textContent = '$' + maxDollar.toLocaleString() + ' (' + maxPct + '%)';
  } else {
    maxLine.style.display = 'none';
  }
  
  const addr = document.getElementById('b-address').value;
  document.getElementById('p-address-line').textContent = addr ? 'Subject Property: ' + addr : '';
}

function downloadPDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'pt',format:'letter'});
  
  const amt = Number(document.getElementById('b-amount').value) || 0;
  const minDollar = Number(document.getElementById('b-min-val-dollar').value) || 0;
  const minPct = Number(document.getElementById('b-min-val-pct').value) || 0;
  const maxDollar = Number(document.getElementById('b-max-val-dollar').value) || 0;
  const maxPct = Number(document.getElementById('b-max-val-pct').value) || 0;
  
  const showMin = document.getElementById('show-min-checkbox').checked;
  const showMax = document.getElementById('show-max-checkbox').checked;
  const address = document.getElementById('b-address').value;
  const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // Amber top stripe
  doc.setFillColor(196,123,43);doc.rect(0,0,612,5,'F');
  // Brown header
  doc.setFillColor(61,43,31);doc.rect(0,5,612,85,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text('Bigfoot Mortgage',56,42);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Where great loans leave a big impression.',56,58);
  doc.setFontSize(9);
  doc.text('Eric Nearing, MLO  ·  NMLS #1884',572,38,{align:'right'});
  doc.text(today,572,52,{align:'right'});

  doc.setTextColor(26,20,16);
  let y=118;const m=44,w=524;
  const ln=(txt,bold=false,sz=11)=>{
    doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(sz);
    const lines=doc.splitTextToSize(txt,w);
    doc.text(lines,m,y);y+=lines.length*16+4;
  };
  ln('To Whom It May Concern,');y+=6;
  ln(`This letter is to confirm that ${config.borrower} has been pre-approved for a mortgage loan under the following terms:`);y+=8;
  
  ln('Loan Type:',true,10);
  y-=4;doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text(config.loanType,130,y-12);y+=6;
  
  ln('Pre-Approved Purchase Price (not to exceed):',true,10);
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setFillColor(61,43,31);
  doc.text('$' + amt.toLocaleString(),m,y+4);y+=28;
  doc.setTextColor(26,20,16);
  
  if(showMin) {
     ln('Minimum Seller Concessions:',true,10);
     y-=4;doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text('$' + minDollar.toLocaleString() + ' (' + minPct + '%)',200,y-12);y+=10;
  }
  
  if(showMax) {
     ln('Maximum Seller Concessions:',true,10);
     y-=4;doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text('$' + maxDollar.toLocaleString() + ' (' + maxPct + '%)',200,y-12);y+=10;
  }
  
  if(address){ln('Subject Property: '+address);y+=4;}
  ln('This pre-approval is based on information provided at the time of application and is subject to satisfactory appraisal, title review, and final underwriting approval. This letter does not constitute a commitment to lend.');
  y+=8;ln('Please do not hesitate to contact our office with any questions.');
  y+=36;
  doc.setDrawColor(26,20,16);doc.line(m,y,m+190,y);y+=13;
  ln('Eric Nearing',true,11);
  ln('Mortgage Loan Officer · NMLS #1884',false,10);
  ln('Bigfoot Mortgage · Tennessee',false,10);
  
  // Footer
  doc.setFillColor(196,123,43);doc.rect(0,751,612,5,'F');
  doc.setFillColor(61,43,31);doc.rect(0,756,612,36,'F');
  doc.setTextColor(255,255,255,0.6);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('letters.bigfootmortgage.com',m,774);
  doc.text('NMLS #1884 · Licensed in Tennessee',572,774,{align:'right'});
  doc.save(`bigfoot-preapproval-${config.borrower.toLowerCase().replace(/[^a-z0-9]/g,'-')}.pdf`);
}
