<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700;900&family=DM+Sans:wght=300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark-green:#1B3B2B;--mid-green:#2D5A43;
  --tan:#F7F4EF;--tan-dark:#EBE5DB;
  --gold:#D4A373;--gold-light:#E9D8A6;
  --ink:#1C2321;--muted:#6B7A74;--border:#D1C7BD;
  --white:#ffffff;
}
body{font-family:'DM Sans',sans-serif;background:var(--tan);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* NAV BAR */
.nav{background:var(--dark-green);padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;min-height:68px;border-bottom:3px solid var(--gold)}
.nav-left{display:flex;align-items:center;gap:14px}
.bigfoot-icon{width:40px;height:40px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-container{display:flex;flex-direction:column}
.logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:var(--white);letter-spacing:-.2px;line-height:1.1}
.logo-sub{font-size:11px;color:var(--gold-light);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-weight:600}
.nav-right{display:flex;align-items:center}
.nav-pill{background:rgba(255,255,255,0.08);color:var(--white);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.15)}

/* TABS NAVIGATION */
.tabs{background:var(--white);display:flex;padding:0 28px;border-bottom:1px solid var(--border);gap:4px}
.tab{padding:16px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--dark-green);background:#faf9f6}
.tab.active{color:var(--dark-green);border-bottom-color:var(--dark-green)}
.tabs.hide-admin #tab-lo-setup, .tabs.hide-admin #tab-lo-dashboard {display:none!important}

/* CORE INTERFACE PANELS */
.panel{display:none;max-width:1020px;margin:0 auto;padding:40px 28px;animation:fadeIn .2s ease-out}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--dark-green);margin-bottom:6px}
.section-sub{font-size:14px;color:var(--muted);margin-bottom:32px}

/* FORM FIELDS CONFIGURATION */
.setup-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;background:var(--white);padding:32px;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(27,59,43,0.04)}
.field{display:flex;flex-direction:column;gap:8px}
.field.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-green)}
input,select{padding:12px 14px;font-family:inherit;font-size:14px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--ink);transition:all .15s}
input:focus,select:focus{outline:none;border-color:var(--dark-green);box-shadow:0 0 0 3px rgba(27,59,43,0.12)}
.hint{font-size:11px;color:var(--muted);margin-top:2px}

/* ACTION BUTTONS */
.btn-primary,.btn-amber{padding:12px 24px;font-family:inherit;font-size:14px;font-weight:600;color:var(--white);border:none;border-radius:6px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:var(--dark-green)}
.btn-primary:hover{background:var(--mid-green)}
.btn-amber{background:var(--dark-green);width:100%}
.btn-amber:hover{background:var(--mid-green)}

/* SECURE SHARING LINKS BOX */
.link-box{margin-top:24px;background:var(--dark-green);color:var(--white);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.link-url{font-family:monospace;font-size:12px;color:var(--tan);word-break:break-all;background:rgba(0,0,0,0.18);padding:10px;border-radius:4px;margin-top:6px;border:1px solid rgba(255,255,255,0.05)}
.copy-btn{background:var(--gold);color:var(--dark-green);border:1px solid var(--gold);padding:10px 18px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;flex-shrink:0}
.copy-btn:hover{background:var(--gold-light);border-color:var(--gold-light)}
.copy-btn.copied{background:#2E5E2E;color:var(--white);border-color:#2E5E2E}

/* MANAGEMENT DATATABLES */
.lo-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.lo-table th{background:var(--dark-green);color:var(--white);text-align:left;padding:14px 18px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.lo-table td{padding:16px 18px;border-bottom:1px solid var(--border);font-size:14px}
.lo-table tr:last-child td{border-bottom:none}
.pill-active{background:rgba(46,94,46,0.1);color:#2E5E2E;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}

/* BORROWER EXPERIENCE DESIGN STYLE */
.borrower-wrap{max-width:540px;margin:0 auto}
.letter-card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(27,59,43,0.06);overflow:hidden}
.letter-header{background:#FAF9F6;padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.lh-left{display:flex;align-items:center;gap:12px}
.lh-icon{font-size:26px}
.lender-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--dark-green)}
.lender-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:500;letter-spacing:0.5px}
.nmls-badge{font-size:9px;font-weight:700;color:var(--muted);text-align:right;letter-spacing:1px;line-height:1.4}
.letter-body{padding:28px;display:flex;flex-direction:column;gap:20px}
.borrow-field{display:flex;flex-direction:column;gap:6px}
.borrow-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.locked-val{background:var(--tan);padding:10px 14px;border-radius:6px;font-size:14px;font-weight:600;color:var(--dark-green);border:1px solid var(--tan-dark)}
.editable-val{padding:12px 14px;font-size:15px;font-weight:600;color:var(--ink);border-color:var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cap-ok{font-size:11px;color:#2E5E2E;font-weight:500;margin-top:2px;display:none}
.alert{background:#fdf2f2;color:#9b1c1c;padding:10px 14px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid #fbd5d5;margin-top:4px;display:none}
.alert.show{display:block}
.letter-footer{padding:20px 28px;background:#FAF9F6;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:between;gap:20px}
.expiry{font-size:12px;color:var(--muted);flex-grow:1}

/* SINGLE BOX INTERACTIVE TOGGLES */
.toggle-row{background:#FCFBF9;padding:14px;border-radius:8px;border:1px solid var(--border);margin-top:4px}
.toggle-control{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600;user-select:none;color:var(--dark-green)}
.toggle-control input{width:16px;height:16px;cursor:pointer;accent-color:var(--dark-green)}

/* PHYSICAL PRINT DOCUMENT PREVIEW PREVIEW */
.preview-wrap{max-width:760px;margin:0 auto}
.pdf-preview{background:var(--white);box-shadow:0 12px 48px rgba(0,0,0,0.06);border:1px solid #BDB4A6;position:relative;min-height:842px}
.pdf-top-bar{height:6px;background:var(--gold)}
.pdf-header{padding:44px 44px 30px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #EDE6DE}
.pdf-logo-row{display:flex;align-items:center;gap:14px}
.pdf-icon{font-size:30px}
.pdf-lender{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--dark-green)}
.pdf-lender-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500;letter-spacing:0.5px}
.pdf-nmls{text-align:right;font-size:11px;line-height:1.5;color:var(--muted);font-weight:500}
.pdf-body{padding:44px 54px;font-size:14px;line-height:1.75;color:#222222;display:flex;flex-direction:column;gap:18px}
.amount-highlight{display:block;font-size:28px;font-family:'Playfair Display',serif;font-weight:900;color:var(--dark-green);margin:4px 0 12px}
.pdf-sig{margin-top:40px;line-height:1.4}
.sig-line{width:180px;height:1px;background:var(--ink);margin-bottom:12px}
.sig-name{font-weight:600;font-size:13px;color:var(--dark-green)}
.sig-title{font-size:11px;color:var(--muted)}
.pdf-footer-bar{position:absolute;bottom:0;left:0;right:0;height:40px;background:var(--dark-green);border-top:4px solid var(--gold)}
</style>
</head>

      <div class="logo">Bigfoot Mortgage</div>
